name: Refresh Bedrock pricing

on:
  schedule:
    - cron: '0 4 * * *'   # Runs at 04:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Scrape pricing page
        run: python aws-bedrock-pricing.py

      - name: Convert JSON to CSV
        run: python json_to_csv.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bedrock_n_level_pricing.json bedrock_pricing.csv
          git diff --cached --quiet || git commit -m "chore: refresh Bedrock pricing data"
          git push
